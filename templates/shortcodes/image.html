{% set img = resize_image(path=path, width=width, op=op |
default(value="fit_width"), format="webp") %}
<figure>
  <img
    src="{{ img.url }}"
    width="{{ img.width }}"
    height="{{ img.height }}"
    alt="{{ alt }}"
  />
  {% if caption %}
  <figcaption>{{ caption }}</figcaption>
  {% endif %}
</figure>

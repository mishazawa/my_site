name: Build and Deploy Zola to Neocities

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch uses the old naming

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Clone the repository code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: "recursive" # Crucial if your theme is installed as a git submodule

      # 2. Download and run Zola to compile the site
      - name: Build Zola Site
        uses: bndw/zola-action@v1
        with:
          args: --output-dir public

      # 3. Push the compiled 'public' folder to Neocities
      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          api_token: ${{ secrets.NEOCITIES_API_KEY }}
          cleanup: true # Removes old files on Neocities that are no longer in your local project
          dist_dir: public # The folder Zola generated
